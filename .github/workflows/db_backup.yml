name: Automatic Database Schema Backup

on:
  schedule:
    # Roda diariamente às 03:00 h (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite rodar o workflow manualmente apertando um botão no Github

jobs:
  db-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump database schema via Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref dqlcxpbfemhzzetwaxsa
          supabase db dump --linked -f database_schema_backup.sql
          
      - name: Upload schema backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-schema-backup-${{ github.run_id }}
          path: database_schema_backup.sql
          retention-days: 30 # O GitHub vai reter este snapshot de schema por 30 dias automaticamente
