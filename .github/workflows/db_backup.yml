name: Automatic Database Backup

on:
  schedule:
    # Roda diariamente às 03:00 h (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch: # Permite rodar o workflow manualmente apertando um botão no Github

jobs:
  db-backup:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Dump Database via Supabase API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref dqlcxpbfemhzzetwaxsa
          supabase db dump --linked -f database_backup.sql
          
      - name: Upload Backup as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: database_backup.sql
          retention-days: 30 # O Github vai reter esse backup por 30 dias automaticamente
