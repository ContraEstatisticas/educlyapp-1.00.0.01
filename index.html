    <script>
    // === FORCE RESET UNIVERSAL v2 ===
    // Incrementar FORCE_RESET_V para forçar reset em TODOS os usuários
    (function(){
      var FORCE_RESET_V = '2';
      var KEY = '__educly_force_reset_v';

      // Detect if current URL is a cache-reset path or has force_reset param
      var path = location.pathname.toLowerCase().replace(/^\//, '').replace(/\/$/, '');
      var isCacheRoute = ['cache', 'reset-cache', 'resetcache', 'limpar-cache', 'clear-cache'].some(function(p) {
        return path === p || path === p + '.html';
      });
      var params = new URLSearchParams(location.search);
      var forceParam = params.get('force_reset') === '1';

      // If on a cache route, always redirect to static .html (bypass SPA)
      if (isCacheRoute) {
        var target = path.indexOf('cache') === 0 ? '/cache.html' : '/reset-cache.html';
        if (location.pathname.indexOf('.html') === -1) {
          window.location.replace(target);
          return;
        }
      }

      // Skip if already done (unless force param or cache route)
      try {
        if (!forceParam && !isCacheRoute && localStorage.getItem(KEY) === FORCE_RESET_V) return;
      } catch(e) { return; }

      // Preserve tutorial keys
      var PRESERVED_PREFIXES = ['has_seen_dashboard_tutorial', 'tutorial_dashboard'];
      var preserved = {};
      try {
        for (var i = 0; i < localStorage.length; i++) {
          var k = localStorage.key(i);
          for (var j = 0; j < PRESERVED_PREFIXES.length; j++) {
            if (k && k.indexOf(PRESERVED_PREFIXES[j]) === 0) {
              preserved[k] = localStorage.getItem(k);
              break;
            }
          }
        }
      } catch(e) {}

      var promises = [];

      // Unregister all service workers
      if ('serviceWorker' in navigator) {
        promises.push(
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            return Promise.all(regs.map(function(r) { return r.unregister(); }));
          }).catch(function() {})
        );
      }

      // Clear Cache Storage
      if ('caches' in window) {
        promises.push(
          caches.keys().then(function(keys) {
            return Promise.all(keys.map(function(k) { return caches.delete(k); }));
          }).catch(function() {})
        );
      }

      // Wait for all async cleanup, THEN mark version and redirect
      (promises.length ? Promise.allSettled(promises) : Promise.resolve()).then(function() {
        try { localStorage.clear(); } catch(e) {}
        try { sessionStorage.clear(); } catch(e) {}

        // Restore preserved keys
        for (var p in preserved) {
          if (preserved.hasOwnProperty(p)) {
            try { localStorage.setItem(p, preserved[p]); } catch(e) {}
          }
        }

        // Mark as done AFTER successful cleanup
        try { localStorage.setItem(KEY, FORCE_RESET_V); } catch(e) {}

        // Redirect to auth (not reload) to avoid loops
        setTimeout(function() {
          window.location.replace('/auth?cache_reset=1&frv=' + FORCE_RESET_V);
        }, 300);
      }).catch(function() {
        // On failure, do NOT mark version so it retries next load
        setTimeout(function() {
          window.location.replace('/auth?cache_reset=1&frv=' + FORCE_RESET_V);
        }, 300);
      });
    })();
    </script>
