<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Educy – Limpando cache</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      gap: 16px;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(99,102,241,0.3);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 18px; }
  </style>
</head>
<body>
  <div class="spinner"></div>
  <p id="status">Limpando cache...</p>

  <script>
    (function() {
      var statusEl = document.getElementById('status');

      // Keys to preserve across cache reset
      var PRESERVED_PREFIXES = ['has_seen_dashboard_tutorial', 'tutorial_dashboard'];

      function run() {
        try {
          // 1. Preserve tutorial keys
          var preserved = {};
          for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            for (var j = 0; j < PRESERVED_PREFIXES.length; j++) {
              if (key && key.indexOf(PRESERVED_PREFIXES[j]) === 0) {
                preserved[key] = localStorage.getItem(key);
                break;
              }
            }
          }

          // 2. Unregister ALL service workers
          var swPromise = Promise.resolve();
          if ('serviceWorker' in navigator) {
            swPromise = navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            });
          }

          // 3. Clear Cache Storage
          var cachePromise = Promise.resolve();
          if ('caches' in window) {
            cachePromise = caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) { return caches.delete(k); }));
            });
          }

          Promise.all([swPromise, cachePromise]).then(function() {
            // 4. Clear all storage
            localStorage.clear();
            sessionStorage.clear();

            // 5. Restore preserved keys
            for (var key in preserved) {
              if (preserved.hasOwnProperty(key)) {
                localStorage.setItem(key, preserved[key]);
              }
            }

            statusEl.textContent = 'Cache limpo! Redirecionando...';
            setTimeout(function() {
              window.location.replace('/auth?cache_reset=1');
            }, 1200);
          }).catch(function() {
            statusEl.textContent = 'Erro parcial. Redirecionando...';
            setTimeout(function() {
              window.location.replace('/auth?cache_reset=1');
            }, 1200);
          });

        } catch(e) {
          statusEl.textContent = 'Erro ao limpar. Redirecionando...';
          setTimeout(function() {
            window.location.replace('/auth?cache_reset=1');
          }, 1500);
        }
      }

      run();
    })();
  </script>
</body>
</html>
